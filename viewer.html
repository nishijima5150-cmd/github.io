<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コミュニティメンバー 一覧</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f6fa; color: #333; }
  header { background: #fff; padding: 24px 32px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header p { font-size: 0.85rem; color: #666; margin-top: 4px; }
  .stats { display: flex; gap: 12px; }
  .stat-card { background: #f0f4ff; border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 80px; }
  .stat-card .num { font-size: 1.6rem; font-weight: 700; color: #3b5bdb; }
  .stat-card .label { font-size: 0.75rem; color: #666; }
  .error-banner { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; margin: 16px 32px; padding: 12px 16px; color: #c00; font-size: 0.9rem; }
  .controls { padding: 16px 32px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .search-box input:focus { border-color: #3b5bdb; }
  .search-box::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; }
  .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all .2s; }
  .btn-primary { background: #3b5bdb; color: #fff; }
  .btn-primary:hover { background: #2f4bbf; }
  .btn-secondary { background: #f0f0f0; color: #555; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-outline { background: #fff; color: #3b5bdb; border: 2px solid #3b5bdb; }
  .btn-outline:hover { background: #f0f4ff; }
  .tag-filter { padding: 12px 32px; background: #fff; border-bottom: 1px solid #e0e0e0; }
  .tag-filter-label { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
  .tag-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-chip { padding: 5px 12px; border-radius: 20px; background: #f0f4ff; color: #3b5bdb; font-size: 0.82rem; cursor: pointer; border: 2px solid transparent; transition: all .15s; user-select: none; }
  .tag-chip:hover { background: #dce4ff; }
  .tag-chip.active { background: #3b5bdb; color: #fff; border-color: #2f4bbf; }
  main { padding: 24px 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .card { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: transform .2s, box-shadow .2s; cursor: pointer; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
  .avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid #e8eaf6; margin-bottom: 12px; }
  .avatar-placeholder { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #3b5bdb, #7048e8); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
  .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .card .role { font-size: 0.82rem; color: #666; margin-bottom: 4px; }
  .card .location { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
  .card .bio { font-size: 0.82rem; color: #555; margin-bottom: 10px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .card-tag { padding: 3px 9px; border-radius: 12px; background: #f0f4ff; color: #3b5bdb; font-size: 0.75rem; }
  .card-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.82rem; color: #3b5bdb; text-decoration: none; word-break: break-all; }
  .card-link:hover { text-decoration: underline; }

  /* リスト表示 */
  .list .card { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-radius: 10px; }
  .list .avatar, .list .avatar-placeholder { width: 48px; height: 48px; min-width: 48px; font-size: 1.1rem; margin-bottom: 0; }
  .list .card-body { flex: 1; }
  .list .card h3 { font-size: 0.95rem; }
  .list .bio { display: none; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 32px; max-width: 520px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; }
  .modal-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #e8eaf6; }
  .modal-avatar-placeholder { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #3b5bdb, #7048e8); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; }
  .modal h2 { font-size: 1.3rem; margin: 12px 0 4px; }
  .modal .role { color: #666; font-size: 0.9rem; margin-bottom: 4px; }
  .modal .location { color: #888; font-size: 0.85rem; margin-bottom: 12px; }
  .modal .bio-full { font-size: 0.9rem; color: #444; line-height: 1.7; margin-bottom: 16px; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .modal-tag { padding: 4px 12px; border-radius: 14px; background: #f0f4ff; color: #3b5bdb; font-size: 0.8rem; }
  .empty { text-align: center; padding: 64px; color: #aaa; }
  .loading { text-align: center; padding: 64px; color: #888; }
  footer { text-align: center; padding: 16px; font-size: 0.8rem; color: #bbb; }
</style>
</head>
<body>

<header>
  <div>
    <h1>コミュニティメンバー 一覧</h1>
    <p>自己登録フォームから集まったメンバーを表示しています</p>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-members">–</div><div class="label">メンバー</div></div>
    <div class="stat-card"><div class="num" id="stat-tags">–</div><div class="label">タグ</div></div>
  </div>
</header>

<div id="error-banner" class="error-banner" style="display:none"></div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="search" placeholder="名前・役割・地域・タグで検索...">
  </div>
  <button class="btn btn-primary" id="btn-card" onclick="setView('card')">カード</button>
  <button class="btn btn-secondary" id="btn-list" onclick="setView('list')">リスト</button>
  <button class="btn btn-outline" id="btn-form" style="display:none" onclick="openForm()">＋ 自分を登録する</button>
  <button class="btn btn-secondary" onclick="loadData()">↺ 再読込</button>
</div>

<div class="tag-filter">
  <div class="tag-filter-label">スキル・タグで絞り込み（複数選択：AND検索）</div>
  <div class="tag-chips" id="tag-chips"></div>
</div>

<main>
  <div id="grid" class="grid"></div>
</main>

<footer id="footer">最終更新：–</footer>

<!-- モーダル -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ============================================================
//  ▼ 設定 — ここを書き換えてください ▼
// ============================================================
const CONFIG = {
  // Googleシートの「ウェブに公開」で出るCSVのURL
  SHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSpSFVLxe0VKVaMOoHSrxhLwOP4_-ckmrsZU_P7lzSLXFoPTF21vjYa3lSYxe1SpsYucwmBt_kgwWxK/pub?gid=1488738074&single=true&output=csv",

  // Googleフォームの公開URL（空にするとボタン非表示）
  FORM_URL: "",

  // ★ フォームの実際の列名に合わせてください
  COLUMNS: {
    lastName:  "氏",          // 姓
    firstName: "名",          // 名
    role:      "役割・職種",
    url:       "ホームページURL",
    tags:      "スキル・タグ",
    photo:     "顔写真",
    location:  "活動している県、市、地名など",
    bio:       "自己PR"
  },

  // タグの区切り文字
  TAG_SEPARATOR: /[,、，\s\/；;]+/
};
// ============================================================

let allMembers = [];
let activeFilters = new Set();
let currentView = 'card';

async function loadData() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loading">読み込み中…</div>';
  document.getElementById('error-banner').style.display = 'none';

  if (!CONFIG.SHEET_CSV_URL) {
    showError('SHEET_CSV_URL が設定されていません。viewer.html の CONFIG を編集してください。');
    grid.innerHTML = '';
    return;
  }

  try {
    const url = CONFIG.SHEET_CSV_URL + '&t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    parseCSV(text);
    document.getElementById('footer').textContent = '最終更新：' + new Date().toLocaleString('ja-JP');
  } catch (e) {
    showError('データを読み込めませんでした：' + e.message + '。シートが「ウェブに公開」されているか、URLが正しいかをご確認ください。');
    grid.innerHTML = '';
  }
}

function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false;
  const chars = [...text];
  let fields = [];

  for (let i = 0; i < chars.length; i++) {
    const c = chars[i];
    if (c === '"') {
      if (inQ && chars[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      fields.push(cur); cur = '';
    } else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && chars[i+1] === '\n') i++;
      fields.push(cur); cur = '';
      rows.push(fields); fields = [];
    } else cur += c;
  }
  if (cur || fields.length) { fields.push(cur); rows.push(fields); }

  if (rows.length < 2) { showError('シートにデータがありません。'); return; }

  // BOM除去＋正規化（中黒・スペースの揺れを吸収）
  function normalize(s) {
    return s.replace(/^\uFEFF/, '')   // BOM
            .replace(/\u30FB|\uFF65|\u00B7/g, '・') // 中黒統一
            .replace(/\u3000/g, ' ')  // 全角スペース
            .trim();
  }
  const headers = rows[0].map(h => normalize(h));
  const C = CONFIG.COLUMNS;

  // 列インデックスを取得（正規化して比較）
  function idx(colName) {
    if (!colName) return -1;
    const norm = normalize(colName);
    const i = headers.findIndex(h => h === norm);
    return i;
  }

  const iLast  = idx(C.lastName);
  const iFirst = idx(C.firstName);
  const iRole  = idx(C.role);
  const iUrl   = idx(C.url);
  const iTags  = idx(C.tags);
  const iPhoto = idx(C.photo);
  const iLoc   = idx(C.location);
  const iBio   = idx(C.bio);

  // 不足列チェック
  const missing = [];
  if (iLast < 0 && iFirst < 0) missing.push(C.lastName + ' または ' + C.firstName);
  if (iRole < 0) missing.push(C.role);
  if (missing.length) {
    showError('列 「' + missing.join('」「') + '」 が見つかりません。CONFIG.COLUMNSを確認してください。検出された列：' + headers.join(' / '));
    return;
  }

  const members = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (row.every(c => !c.trim())) continue;
    const get = i => (i >= 0 && i < row.length) ? row[i].trim() : '';

    const lastName  = get(iLast);
    const firstName = get(iFirst);
    const fullName  = (lastName + ' ' + firstName).trim() || '名前未登録';

    const rawTags = get(iTags);
    const tags = rawTags ? rawTags.split(CONFIG.TAG_SEPARATOR).map(t=>t.trim()).filter(Boolean) : [];

    members.push({
      name: fullName,
      role: get(iRole),
      url:  get(iUrl),
      tags,
      photo: get(iPhoto),
      location: get(iLoc),
      bio: get(iBio)
    });
  }

  allMembers = members;
  buildTagChips();
  renderMembers();
  document.getElementById('stat-members').textContent = members.length;

  if (CONFIG.FORM_URL) {
    document.getElementById('btn-form').style.display = '';
  }
}

function buildTagChips() {
  const tagCount = {};
  allMembers.forEach(m => m.tags.forEach(t => { tagCount[t] = (tagCount[t]||0)+1; }));
  const sorted = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);

  document.getElementById('stat-tags').textContent = sorted.length;
  const chips = document.getElementById('tag-chips');
  chips.innerHTML = '';
  sorted.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip' + (activeFilters.has(tag) ? ' active' : '');
    chip.textContent = tag;
    chip.onclick = () => toggleFilter(tag);
    chips.appendChild(chip);
  });
}

function toggleFilter(tag) {
  if (activeFilters.has(tag)) activeFilters.delete(tag);
  else activeFilters.add(tag);
  buildTagChips();
  renderMembers();
}

function renderMembers() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.className = currentView === 'list' ? 'list' : 'grid';

  const filtered = allMembers.filter(m => {
    const text = [m.name, m.role, m.location, m.bio, ...m.tags].join(' ').toLowerCase();
    if (q && !text.includes(q)) return false;
    if (activeFilters.size > 0 && ![...activeFilters].every(f => m.tags.includes(f))) return false;
    return true;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">該当するメンバーが見つかりません</div>';
    return;
  }

  grid.innerHTML = filtered.map((m, i) => {
    const initials = m.name.replace(/\s/g,'').slice(0,2) || '?';
    const photoUrl = convertDriveUrl(m.photo);
    const avatar = photoUrl
      ? `<img class="avatar" src="${escHtml(photoUrl)}" alt="${escHtml(m.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="avatar-placeholder" style="display:none">${escHtml(initials)}</div>`
      : `<div class="avatar-placeholder">${escHtml(initials)}</div>`;

    const tags = m.tags.map(t=>`<span class="card-tag">${escHtml(t)}</span>`).join('');
    const link = m.url ? `<a class="card-link" href="${escHtml(m.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${escHtml(m.url)}</a>` : '';
    const loc  = m.location ? `<div class="location">📍 ${escHtml(m.location)}</div>` : '';
    const bio  = m.bio ? `<div class="bio">${escHtml(m.bio)}</div>` : '';

    return `<div class="card" onclick="openModal(${i})">
      ${avatar}
      <div class="card-body">
        <h3>${escHtml(m.name)}</h3>
        <div class="role">${escHtml(m.role)}</div>
        ${loc}
        ${bio}
        <div class="card-tags">${tags}</div>
        ${link}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const m = allMembers[idx];
  const initials = m.name.replace(/\s/g,'').slice(0,2) || '?';
  const photoUrl = convertDriveUrl(m.photo);
  const avatar = photoUrl
    ? `<img class="modal-avatar" src="${escHtml(photoUrl)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="modal-avatar-placeholder" style="display:none">${escHtml(initials)}</div>`
    : `<div class="modal-avatar-placeholder">${escHtml(initials)}</div>`;
  const tags = m.tags.map(t=>`<span class="modal-tag">${escHtml(t)}</span>`).join('');
  const link = m.url ? `<a class="card-link" href="${escHtml(m.url)}" target="_blank" rel="noopener">🔗 ${escHtml(m.url)}</a>` : '';
  const loc  = m.location ? `<div class="location">📍 ${escHtml(m.location)}</div>` : '';
  const bio  = m.bio ? `<div class="bio-full">${escHtml(m.bio)}</div>` : '';

  document.getElementById('modal-body').innerHTML = `
    ${avatar}
    <h2>${escHtml(m.name)}</h2>
    <div class="role">${escHtml(m.role)}</div>
    ${loc}
    ${bio}
    <div class="modal-tags">${tags}</div>
    ${link}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function openForm() { window.open(CONFIG.FORM_URL, '_blank'); }
function setView(v) {
  currentView = v;
  document.getElementById('btn-card').className = 'btn ' + (v==='card' ? 'btn-primary' : 'btn-secondary');
  document.getElementById('btn-list').className = 'btn ' + (v==='list' ? 'btn-primary' : 'btn-secondary');
  renderMembers();
}
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}
function convertDriveUrl(url) {
  if (!url) return '';
  let id = '';
  let m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) id = m[1];
  if (!id) { m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (m) id = m[1]; }
  if (!id) { m = url.match(/\/d\/([a-zA-Z0-9_-]+)/); if (m) id = m[1]; }
  if (id) return 'https://lh3.googleusercontent.com/d/' + id;
  return url;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('search').addEventListener('input', renderMembers);

loadData();
</script>
</body>
</html>
